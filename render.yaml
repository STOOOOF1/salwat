services:
  - type: web
    name: salwat-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: salwat-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PIN
        value: "1234"

  - type: web
    name: salwat-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        value: https://salwat-backend.onrender.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: salwat-db
    databaseName: salwat
    user: salwat
    plan: free
