services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: salwat
      POSTGRES_USER: salwat
      POSTGRES_PASSWORD: salwat_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5433:5432"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://salwat:salwat_pass@db:5432/salwat
      SECRET_KEY: change-this-in-production
    ports:
      - "8001:8000"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
